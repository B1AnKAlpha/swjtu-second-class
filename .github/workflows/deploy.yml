name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/swjtu-monitor

            # 拉取最新代码
            echo '[deploy] git pull start'
            git pull origin main
            echo '[deploy] git pull done'

            # 安装依赖（跳过 devDependencies 外的 optional）
            echo '[deploy] npm ci start'
            npm --version
            echo '[deploy] permission check start'
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              echo '[deploy] fixing workspace ownership via sudo chown'
              sudo chown -R "$(id -u):$(id -g)" /opt/swjtu-monitor
              echo '[deploy] workspace ownership fixed'
            else
              echo '[deploy] skip chown (sudo not available in non-interactive mode)'
            fi
            echo '[deploy] permission check done'
            npm config set fund false
            npm config set audit false
            npm config set fetch-retries 3
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            if [ -d node_modules ]; then
              echo '[deploy] npm install incremental start'
              if timeout 8m npm install --omit=optional --no-audit --no-fund --loglevel=error; then
                echo '[deploy] npm install incremental done'
              else
                echo '[deploy] npm install incremental failed, fallback to clean install'
                rm -rf node_modules
                timeout 12m npm ci --omit=optional --no-audit --no-fund --loglevel=error
                echo '[deploy] npm ci fallback done'
              fi
            else
              echo '[deploy] npm ci cold start'
              timeout 12m npm ci --omit=optional --no-audit --no-fund --loglevel=error
              echo '[deploy] npm ci cold start done'
            fi
            echo '[deploy] npm ci done'

            # 生成 Prisma Client + 执行数据库迁移
            echo '[deploy] prisma generate start'
            npx prisma generate
            echo '[deploy] prisma generate done'
            echo '[deploy] prisma migrate deploy start'
            npx prisma migrate deploy
            echo '[deploy] prisma migrate deploy done'

            # 构建 Next.js
            echo '[deploy] npm run build start'
            npm run build
            echo '[deploy] npm run build done'

            # 用 PM2 重启（首次用 start，之后用 reload）
            echo '[deploy] pm2 reload/start start'
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            echo '[deploy] pm2 reload/start done'
            echo '[deploy] pm2 save start'
            pm2 save
            echo '[deploy] pm2 save done'

            # 部署后立即清理：删除源站中标记为“不可报名”的课程
            echo '[deploy] cleanup start'
            timeout 8m node <<'NODE'
            const axios = require('axios')
            const cheerio = require('cheerio')
            const { PrismaClient } = require('@prisma/client')

            const BASE_URL = 'http://ocw.swjtu.edu.cn/yethan'
            const LIST_URL = `${BASE_URL}/YouthIndex?setAction=courseList`

            function pickFirstNonEmpty(values) {
              for (const value of values) {
                const text = String(value || '').trim()
                if (text) return text
              }
              return ''
            }

            function isNotOpenForRegistration(text) {
              return /不可报名/.test(text)
            }

            function parseDateTime(raw) {
              const text = String(raw || '').trim()
              if (!text) return null
              const dt = new Date(text.replace(' ', 'T'))
              return Number.isNaN(dt.getTime()) ? null : dt
            }

            function shouldKeepFullActivity(registered, capacity, regEndAt, now) {
              if (capacity <= 0 || registered < capacity) return false
              return !regEndAt || regEndAt > now
            }

            async function collectClosedIds(client, maxPages = 20) {
              const closedIds = new Set()
              const baseForm = { key1: '', key2: '', key3: '', key4: '', key5: '', key6: '', key7: '' }

              console.log('[deploy] cleanup fetch first page start')
              const firstRes = await client.get(LIST_URL)
              console.log('[deploy] cleanup fetch first page done')
              const pages = [firstRes.data]
              const $first = cheerio.load(firstRes.data)
              const totalText = $first('ul li')
                .filter((_, el) => $first(el).text().includes('共') && $first(el).text().includes('页'))
                .text()
              const totalMatch = totalText.match(/共(\d+)页/)
              const totalPages = totalMatch ? Math.min(parseInt(totalMatch[1], 10), maxPages) : 1
              console.log('[deploy] cleanup total pages:', totalPages)

              for (let page = 2; page <= totalPages; page++) {
                console.log('[deploy] cleanup fetch page start:', page)
                const body = new URLSearchParams({ ...baseForm, jumpPage: String(page) }).toString()
                const res = await client.post(LIST_URL, body, {
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                })
                pages.push(res.data)
                console.log('[deploy] cleanup fetch page done:', page)
              }

              console.log('[deploy] cleanup parse pages start')
              for (const html of pages) {
                const $ = cheerio.load(html)
                const now = new Date()
                $('ul.process-list > li').each((_, el) => {
                  const $el = $(el)
                  const onclick = $el.find('p.list-tit').attr('onclick') || ''
                  const idMatch = onclick.match(/getCourseInfo\('([^']+)'\)/)
                  if (!idMatch) return

                  const registered = parseInt($el.find('.cont-num > div:first-child span').eq(1).text().trim(), 10) || 0
                  const capacity = parseInt($el.find('.cont-num > div:first-child span').eq(2).text().replace('/', '').trim(), 10) || 0
                  const regEnd = $el.find('.endTime').attr('v') || ''
                  const regEndAt = parseDateTime(regEnd)

                  const statusText = pickFirstNonEmpty([
                    $el.find('.btn').text(),
                    $el.find('.apply-btn').text(),
                    $el.find('.sign-btn').text(),
                    $el.find('.cont-btn').text(),
                    $el.find('.list-cont-bottom').text(),
                    $el.text(),
                  ])

                  if (isNotOpenForRegistration(statusText) && !shouldKeepFullActivity(registered, capacity, regEndAt, now)) {
                    closedIds.add(idMatch[1])
                  }
                })
              }
              console.log('[deploy] cleanup parse pages done, closed ids:', closedIds.size)

              return closedIds
            }

            async function main() {
              console.log('[deploy] cleanup script main start')
              const prisma = new PrismaClient()
              const client = axios.create({
                timeout: 15000,
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Linux; Android 12; SM-G9910) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/107.0.5304.105 Mobile Safari/537.36 MMWEBID/2972 MicroMessenger/8.0.38.2420(0x2800263A) WeChat/arm64 Weixin NetType/WIFI Language/zh_CN ABI/arm64',
                  'X-Requested-With': 'com.tencent.mm',
                  Referer: LIST_URL,
                  ...(process.env.SWJTU_COOKIE ? { Cookie: process.env.SWJTU_COOKIE } : {}),
                },
              })

              try {
                // 历史订阅和课程统一为“全部类型”（不再区分竞赛/讲座/活动）
                const normalizedSubs = await prisma.subscriber.updateMany({ data: { types: '[]' } })
                const normalizedActivities = await prisma.activity.updateMany({ data: { type: '' } })
                console.log('[deploy] normalized subscriber types:', normalizedSubs.count)
                console.log('[deploy] normalized activity types:', normalizedActivities.count)

                const closedIds = await collectClosedIds(client)

                if (closedIds.size === 0) {
                  console.log('[deploy] no closed activities found to clean')
                  return
                }

                const result = await prisma.activity.deleteMany({
                  where: { id: { in: Array.from(closedIds) } },
                })
                console.log('[deploy] cleaned not-open activities:', result.count)
              } catch (e) {
                console.error('[deploy] cleanup failed:', e)
                process.exitCode = 1
              } finally {
                await prisma.$disconnect()
                console.log('[deploy] cleanup script main end')
              }
            }

            main()
            NODE
            echo '[deploy] cleanup done'
