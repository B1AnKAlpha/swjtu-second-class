name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/swjtu-monitor

            # 拉取最新代码
            git pull origin main

            # 安装依赖（跳过 devDependencies 外的 optional）
            npm ci --omit=optional

            # 生成 Prisma Client + 执行数据库迁移
            npx prisma generate
            npx prisma migrate deploy

            # 构建 Next.js
            npm run build

            # 用 PM2 重启（首次用 start，之后用 reload）
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save

            # 部署后立即清理：删除尚未到报名开始时间的课程
            node <<'NODE'
            const { PrismaClient } = require('@prisma/client')

            async function main() {
              const prisma = new PrismaClient()
              try {
                const now = new Date().toISOString().replace('T', ' ').substring(0, 19)
                const result = await prisma.activity.deleteMany({
                  where: {
                    AND: [
                      { regStart: { not: '' } },
                      { regStart: { gt: now } },
                    ],
                  },
                })
                console.log('[deploy] cleaned not-started activities:', result.count)
              } catch (e) {
                console.error('[deploy] cleanup failed:', e)
                process.exitCode = 1
              } finally {
                await prisma.$disconnect()
              }
            }

            main()
            NODE
